<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verona Store</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="./style.css">
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg fixed-top shadow-sm">
    <div class="container">
        <img src="images/Logo.png" height="50">
    </div>
</nav>

<!-- Hero -->
<section class="hero-section text-white">

    <div class="container text-center hero-content">

        <h1>
            <span class="brand-name">Verona</span><br>
            <span class="brand-sub">Store</span>
        </h1>

        <p class="mt-3">Your everyday sparkle starts here</p>

    </div>

</section>

<!-- Categories -->
<section id="products" class="py-5">
    <div class="container">
        <h2 class="text-center mb-5 section-title">Categories</h2>

        <div class="row g-4">

            <div class="col-12 col-md-3">
                <div class="category-card">
                    <img src="images/2.jpg">
                    <div class="overlay">Watches</div>
                </div>
            </div>

            <div class="col-12 col-md-3">
                <div class="category-card">
                    <img src="images/3.jpg">
                    <div class="overlay">Rings</div>
                </div>
            </div>

            <div class="col-12 col-md-3">
                <div class="category-card">
                    <img src="images/4.jpg">
                    <div class="overlay">Necklaces</div>
                </div>
            </div>

            <div class="col-12 col-md-3">
                <div class="category-card">
                    <img src="images/5.jpg">
                    <div class="overlay">Bracelets</div>
                </div>
            </div>

        </div>

        <div class="text-center mt-5">
            <a href="https://wa.me/201050371500?text=Hello%20I%20want%20to%20order%20accessories"
               class="btn order-btn" target="_blank">
               Order Now
            </a>
        </div>

    </div>
</section>

<!-- Contact -->
<section class="contact-section text-center py-5">
    <div class="container">
        <h3 class="mb-4">Contact Us</h3>

        <div class="social-icons">
            <a href="https://wa.me/201050371500"><i class="fab fa-whatsapp"></i></a>
            <a href="https://www.facebook.com/groups/434101789413684"><i class="fab fa-facebook"></i></a>
            <a href="https://www.instagram.com/verona_whatchs_brand"><i class="fab fa-instagram"></i></a>
        </div>
    </div>
</section>

<!-- Footer -->
<footer class="footer text-center py-4">
    <div class="container">
        <p class="mb-2">Verona Store - Accessories that make you shine</p>
        <small>© 2026 All Rights Reserved</small>
    </div>
</footer>

<!-- WhatsApp Floating -->
<a href="https://chat.whatsapp.com/BmlNkXEdjVBCLw2bJDLXex" class="whatsapp-float">
    <i class="fab fa-whatsapp"></i>
</a>

</body>
</html>
